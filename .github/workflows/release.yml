name: Build and Release Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build app (PyInstaller)
        shell: pwsh
        run: |
          pyinstaller chase_game.spec

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe"
          }
          & $iscc installer.iss

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/installer/KittyChase-Setup.exe

  build-release-macos:
    runs-on: macos-latest
    needs: build-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build app + DMG
        shell: bash
        run: |
          bash tools/build_macos.sh

      - name: Publish GitHub Release (macOS)
        uses: softprops/action-gh-release@v2
        with:
          files: dist/installer/KittyChase-macOS.dmg

  build-release-macos-intel:
    runs-on: macos-15-large
    needs: build-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build app + DMG (Intel)
        shell: bash
        env:
          MAC_DMG_NAME: KittyChase-macOS-intel.dmg
        run: |
          bash tools/build_macos.sh

      - name: Publish GitHub Release (macOS Intel)
        uses: softprops/action-gh-release@v2
        with:
          files: dist/installer/KittyChase-macOS-intel.dmg
